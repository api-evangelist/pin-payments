    namespace: pin-payments-refunds
    baseUri: https://api.pinpayments.com/1
    description: Pin Payments API — Refunds business capability. Self-contained, no shared references.
    resources:
    - name: charges-charge_token-refunds
      path: /charges/{charge_token}/refunds
      operations:
      - name: get
        method: GET
        description: List refunds for a charge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create a refund
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: refunds
      path: /refunds
      operations:
      - name: get
        method: GET
        description: List refunds
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: refunds-refund_token
      path: /refunds/{refund_token}
      operations:
      - name: get
        method: GET
        description: Retrieve a refund
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:

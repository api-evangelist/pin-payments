      description: List refunds for a charge
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pin-payments-refunds.get
      outputParameters:
      - type: object
        mapping: $.
    - name: create-refund
      description: Create a refund
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pin-payments-refunds.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-refunds

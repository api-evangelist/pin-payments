      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pin-payments-refunds.get
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-refund
      description: Retrieve a refund
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pin-payments-refunds.get
      with:
        refund_token: tools.refund_token
      outputParameters:
      - type: object
        mapping: $.

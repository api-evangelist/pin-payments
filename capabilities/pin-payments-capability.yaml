naftiko: 1.0.0-alpha2
info:
  label: Pin Payments API
  description: A complete payments solution, built for speed and simplicity. The Pin Payments API enables you to charge cards,
    manage customers, issue refunds, store cards, and run subscriptions.
  tags:
  - Pin
  - Payments
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: pin-payments
    baseUri: https://api.pinpayments.com/1
    description: Pin Payments API HTTP API.
    authentication:
      type: basic
      username: '{{PIN_PAYMENTS_USERNAME}}'
      password: '{{PIN_PAYMENTS_PASSWORD}}'
    resources:
    - name: charges
      path: /charges
      operations:
      - name: post-charges
        method: POST
        description: Create a charge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-charges
        method: GET
        description: List charges
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: charges-search
      path: /charges/search
      operations:
      - name: get-charges-search
        method: GET
        description: Search charges
        inputParameters:
        - name: query
          in: query
          type: string
        - name: start_date
          in: query
          type: string
        - name: end_date
          in: query
          type: string
        - name: sort
          in: query
          type: string
        - name: direction
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: charges-charge-token
      path: /charges/{charge_token}
      operations:
      - name: get-charges-charge-token
        method: GET
        description: Retrieve a charge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: charges-charge-token-void
      path: /charges/{charge_token}/void
      operations:
      - name: put-charges-charge-token-void
        method: PUT
        description: Void an authorized charge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: charges-charge-token-capture
      path: /charges/{charge_token}/capture
      operations:
      - name: put-charges-charge-token-capture
        method: PUT
        description: Capture a previously authorized charge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: charges-verify
      path: /charges/verify
      operations:
      - name: get-charges-verify
        method: GET
        description: Verify a 3D Secure result
        inputParameters:
        - name: session_token
          in: query
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.

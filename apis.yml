aid: pin-payments
name: Pin Payments
description: A complete payments solution, built for speed and simplicity around your unique business needs. The Pin Payments
  API enables developers to charge cards, manage customers, store payment sources, issue refunds, and run subscriptions through
  a RESTful JSON interface secured with HTTP Basic authentication.
